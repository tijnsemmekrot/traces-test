# kargo/stages.yaml
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: traces-test
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: traces-test-warehouse
      sources:
        direct: true
  promotionMechanisms:
    autoPromotionEnabled: true
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: https://github.com/tijnsemmekrot/traces-test.git
            checkout: [{ branch: main }]
            credentials:
              name: git-credentials # Reference the secret

        # Promotion for Service 1
        - uses: kustomize-set-image
          config:
            images: [{ image: account-service-image }]
            path: environments/dev/account-service

        # Promotion for Service 2
        - uses: kustomize-set-image
          config:
            images: [{ image: fraud-detector-image }]
            path: environments/dev/fraud-detector

        # Promotion for Service 3
        - uses: kustomize-set-image
          config:
            images: [{ image: notification-service-image }]
            path: environments/dev/notification-service

        # Promotion for Service 4
        - uses: kustomize-set-image
          config:
            images: [{ image: payment-processor-image }]
            path: environments/dev/payment-processor

        # Promotion for Service 5
        - uses: kustomize-set-image
          config:
            images: [{ image: payment-requester-image }]
            path: environments/dev/payment-requester

        - uses: git-push
          config:
            repoURL: https://github.com/tijnsemmekrot/traces-test.git
            targetBranch: main
            credentials:
              name: git-credentials # Reference the secret here too
