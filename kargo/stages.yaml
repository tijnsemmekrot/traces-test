apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: traces-test
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: traces-test-warehouse
      sources:
        direct: true
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: https://github.com/tijnsemmekrot/traces-test.git
            checkout:
              - branch: kargo-implementation
                path: repo

        # Service 1: account-service
        - uses: kustomize-set-image
          config:
            path: repo/environments/dev/account-service
            images:
              - image: 000000000000.dkr.ecr.eu-west-1.localhost.localstack.cloud:4566/traces-test-account-service
                newTag: ${{ images['000000000000.dkr.ecr.eu-west-1.localhost.localstack.cloud:4566/traces-test-account-service'].tag }}

        # Service 2: fraud-detector
        - uses: kustomize-set-image
          config:
            path: repo/environments/dev/fraud-detector
            images:
              - image: 000000000000.dkr.ecr.eu-west-1.localhost.localstack.cloud:4566/traces-test-fraud-detector
                newTag: ${{ images['000000000000.dkr.ecr.eu-west-1.localhost.localstack.cloud:4566/traces-test-fraud-detector'].tag }}

        # Service 3: notification-service
        - uses: kustomize-set-image
          config:
            path: repo/environments/dev/notification-service
            images:
              - image: 000000000000.dkr.ecr.eu-west-1.localhost.localstack.cloud:4566/traces-test-notification-service
                newTag: ${{ images['000000000000.dkr.ecr.eu-west-1.localhost.localstack.cloud:4566/traces-test-notification-service'].tag }}

        # Service 4: payment-processor
        - uses: kustomize-set-image
          config:
            path: repo/environments/dev/payment-processor
            images:
              - image: 000000000000.dkr.ecr.eu-west-1.localhost.localstack.cloud:4566/traces-test-payment-processor
                newTag: ${{ images['000000000000.dkr.ecr.eu-west-1.localhost.localstack.cloud:4566/traces-test-payment-processor'].tag }}

        # Service 5: payment-requester
        - uses: kustomize-set-image
          config:
            path: repo/environments/dev/payment-requester
            images:
              - image: 000000000000.dkr.ecr.eu-west-1.localhost.localstack.cloud:4566/traces-test-payment-requester
                newTag: ${{ images['000000000000.dkr.ecr.eu-west-1.localhost.localstack.cloud:4566/traces-test-payment-requester'].tag }}

        - uses: git-commit
          config:
            path: repo
            # Referencing steps by their default index aliases (step-2 through step-6)
            messageFromSteps:
              - step-2
              - step-3
              - step-4
              - step-5
              - step-6

        - uses: git-push
          config:
            path: repo
            targetBranch: kargo-implementation
