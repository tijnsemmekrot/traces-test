apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: account-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tijnsemmekrot/traces-test.git
    targetRevision: main
    path: environments/dev/account-service
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
