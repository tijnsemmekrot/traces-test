# argocd-bootstrap/root-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservices-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tijnsemmekrot/traces-test.git
    targetRevision: main
    path: services/ # <--- Change this from environments/dev/
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd # Root app usually lives in the argocd namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
