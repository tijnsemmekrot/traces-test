# argocd-bootstrap/root-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservices-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:tijnsemmekrot/traces-test.git
    targetRevision: HEAD
    path: services/
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated: {}
