apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elastic-agent-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/tijnsemmekrot/localstack-test.git # Update with your repo
    targetRevision: main
    path: elastic-agent/environments/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: elastic-agent-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Health checks
  ignoreDifferences:
    - group: apps
      kind: DaemonSet
      jsonPointers:
        - /spec/template/metadata/annotations
