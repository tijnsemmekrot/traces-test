---
apiVersion: v1
kind: Namespace
metadata:
  name: elastic-agent-kargo
  labels:
    kargo.akuity.io/project: "true"

---
apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: elastic-agent-kargo

---
# Warehouse - watches LocalStack ECR in eu-west-1
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: elastic-agent
  namespace: elastic-agent-kargo
spec:
  subscriptions:
    - image:
        repoURL: 000000000000.dkr.ecr.eu-west-1.localhost.localstack.cloud:4566/elastic-agent
        allowInsecure: true
        semverConstraint: ">=8.12.0"
        discoveryLimit: 5
        imageSelectionStrategy: NewestBuild

---
# Dev Stage - auto-promotes from warehouse
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: elastic-agent-kargo
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: elastic-agent
      sources:
        direct: true

  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: https://github.com/tijnsemmekrot/traces-test
            checkout:
              - branch: kargo-implementation
                path: ./src # This is the workbench folder
        - uses: git-clear
          config:
            path: ./src
        - uses: kustomize-set-image
          as: update-image
          config:
            # Matches your tree: [workbench]/[repo-folder]/environments/dev
            path: ./src/elastic-agent/environments/dev
            images:
              - image: 000000000000.dkr.ecr.eu-west-1.localhost.localstack.cloud:4566/elastic-agent
                tag: ${{ imageFrom("000000000000.dkr.ecr.eu-west-1.localhost.localstack.cloud:4566/elastic-agent").Tag }}
        - uses: git-commit
          as: commit
          config:
            path: ./src
            messageFromSteps:
              - update-image
        - uses: git-push
          config:
            path: ./src
        - uses: argocd-update
          config:
            apps:
              - name: elastic-agent-dev
                namespace: argocd

---
# Staging Stage - manual promotion from dev
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: elastic-agent-kargo
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: elastic-agent
      sources:
        stages:
          - dev

  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: https://github.com/tijnsemmekrot/traces-test
            checkout:
              - fromFreight: true
                path: ./src
        - uses: git-clear
          config:
            path: ./src
        - uses: kustomize-set-image
          as: update-image
          config:
            path: ./src/elastic-agent/environments/staging
            images:
              - image: 000000000000.dkr.ecr.eu-west-1.localhost.localstack.cloud:4566/elastic-agent
        - uses: git-commit
          as: commit
          config:
            path: ./src
            messageFromSteps:
              - update-image
        - uses: git-push
          config:
            path: ./src
        - uses: argocd-update
          config:
            apps:
              - name: elastic-agent-staging
                namespace: argocd

---
# Prod Stage - manual promotion from staging
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: elastic-agent-kargo
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: elastic-agent
      sources:
        stages:
          - staging

  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: https://github.com/tijnsemmekrot/traces-test
            checkout:
              - fromFreight: true
                path: ./src
        - uses: git-clear
          config:
            path: ./src
        - uses: kustomize-set-image
          as: update-image
          config:
            path: ./src/elastic-agent/environments/prod
            images:
              - image: 000000000000.dkr.ecr.eu-west-1.localhost.localstack.cloud:4566/elastic-agent
        - uses: git-commit
          as: commit
          config:
            path: ./src
            messageFromSteps:
              - update-image
        - uses: git-push
          config:
            path: ./src
        - uses: argocd-update
          config:
            apps:
              - name: elastic-agent-prod
                namespace: argocd
