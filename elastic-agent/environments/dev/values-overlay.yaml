apiVersion: v1
kind: ConfigMap
metadata:
  name: elastic-agent-values-dev
  namespace: elastic-agent-dev
data:
  values.yaml: |
    # Dev environment overrides

    outputs:
      default:
        type: elasticsearch
        hosts:
          - "https://elasticsearch-dev:9200"
        username: "elastic"
        password: "dev-password"

    resources:
      limits:
        memory: 800Mi
        cpu: 150m
      requests:
        memory: 300Mi
        cpu: 50m

    env:
      - name: ENVIRONMENT
        value: "dev"
      - name: LOG_LEVEL
        value: "debug"
