apiVersion: v1
kind: ConfigMap
metadata:
  name: elastic-agent-values-staging
  namespace: elastic-agent-staging
data:
  values.yaml: |
    # Staging environment overrides

    outputs:
      default:
        type: elasticsearch
        hosts:
          - "https://elasticsearch-staging:9200"
        username: "elastic"
        password: "staging-password"

    resources:
      limits:
        memory: 900Mi
        cpu: 180m
      requests:
        memory: 350Mi
        cpu: 80m

    env:
      - name: ENVIRONMENT
        value: "staging"
      - name: LOG_LEVEL
        value: "info"
