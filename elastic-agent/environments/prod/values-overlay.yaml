apiVersion: v1
kind: ConfigMap
metadata:
  name: elastic-agent-values-prod
  namespace: elastic-agent-prod
data:
  values.yaml: |
    # Production environment overrides

    outputs:
      default:
        type: elasticsearch
        hosts:
          - "https://elasticsearch-prod:9200"
        username: "elastic"
        password: "prod-password"

    resources:
      limits:
        memory: 1000Mi
        cpu: 200m
      requests:
        memory: 400Mi
        cpu: 100m

    env:
      - name: ENVIRONMENT
        value: "production"
      - name: LOG_LEVEL
        value: "warn"

    # Production-specific settings
    daemonset:
      updateStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
