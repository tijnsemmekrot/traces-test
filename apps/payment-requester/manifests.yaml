apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-requester
  labels:
    app: payment-requester
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-requester
  template:
    metadata:
      labels:
        app: payment-requester
    spec:
      containers:
        - name: payment-requester
          image: tijnsemmekrot/traces-test:payment-requester
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: PAYMENT_PROCESSOR_URL
              value: "http://payment-processor:8080"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "0.1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payment-requester
spec:
  selector:
    app: payment-requester
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
